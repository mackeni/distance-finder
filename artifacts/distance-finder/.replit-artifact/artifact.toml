kind = "web"
previewPath = "/"
title = "Distance Finder"
version = "1.0.0"
id = "artifacts/distance-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25636

[services.development]
run = "pnpm --filter @workspace/distance-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/distance-finder", "run", "build" ]
publicDir = "artifacts/distance-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25636"
BASE_PATH = "/"
